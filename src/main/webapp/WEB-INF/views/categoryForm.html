<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>카테고리 등록</title>
</head>
<body>
<div class="container" style="max-width: 600px; margin-top: 50px;">

  <h2>새 카테고리 등록</h2>
  <hr>

  <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">

    <div class="mb-3">
      <label th:for="name" class="form-label">카테고리 이름</label>
      <input type="text" th:field="*{name}" class="form-control" placeholder="카테고리 이름"/>

      <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger mt-1"></div>
    </div>

    <button type="submit" class="btn btn-primary">등록</button>
    <a th:href="@{/categories}" class="btn btn-secondary">취소</a>
  </form>

  <hr style="margin-top: 50px;">

  <footer style="text-align: center; color: gray;">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' | 학번: 2131139 | 성명: 임창수'}"></p>
  </footer>

</div>
</body>
</html>
