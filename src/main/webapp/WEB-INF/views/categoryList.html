<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>카테고리 목록</title>
</head>
<body>
<div class="container" style="max-width: 800px; margin-top: 50px;">

    <h2>카테고리 관리</h2>
    <hr>

    <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

    <div class="mb-3 text-end">
        <a th:href="@{/categories/create}" class="btn btn-primary">새 카테고리 등록</a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>카테고리 이름</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.name}"></td>
            <td>
                <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="text-center mt-4">
        <a th:href="@{/}" class="btn btn-secondary">메인으로 돌아가기</a>
    </div>
</div>
<footer style="text-align: center; margin-top: 20px; color: gray;">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' | 학번: 2131139 | 성명: 임창수'}"></p>
</footer>
</body>
</html>
