<!DOCTYPE html>
<!--
    Thymeleaf 네임스페이스 선언:
    xmlns:th="http://www.thymeleaf.org"
    th:* 속성들이 Thymeleaf 표현식으로 처리됩니다.
    이 속성이 없으면 브라우저는 th:* 를 무시하고 일반 HTML로 렌더링합니다.
    (내추럴 템플릿: 서버 없이 브라우저에서도 기본 레이아웃 확인 가능)
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 목록 - Product Management</title>
    <style>
        /* 학습에 집중하기 위한 간단한 인라인 스타일 */
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 16px; }
        .btn:hover { background: #357abd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f5f8ff; }
        .price { text-align: right; font-weight: bold; color: #e74c3c; }
        .detail-link { color: #4a90d9; text-decoration: none; }
        .detail-link:hover { text-decoration: underline; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>상품 목록</h1>

    <!--
        th:if="${successMessage}":
        Model에 successMessage 속성이 있을 때만 이 div를 렌더링합니다.
        RedirectAttributes.addFlashAttribute()로 전달된 값이 여기 표시됩니다.
    -->
    <a href="/products/new" class="btn btn-primary">+ 새 상품 등록</a>

    <a th:href="@{/categories}" class="btn btn-info">카테고리 관리 가기</a>
    <div class="alert-success" th:if="${successMessage}">
        <!-- th:text: XSS 방지를 위해 HTML 이스케이핑 후 텍스트를 표시합니다. -->
        <span th:text="${successMessage}">성공 메시지</span>
    </div>

    <!-- th:href: Thymeleaf가 컨텍스트 경로를 자동으로 앞에 붙여줍니다. -->
    <!-- @{/products/create} → /products/create (컨텍스트 경로 자동 처리) -->
    <a class="btn" th:href="@{/products/create}">+ 새 상품 등록</a>

    <!--
        th:if / th:unless: 조건부 렌더링
        th:unless = th:if 의 반대 (조건이 false일 때 렌더링)
    -->
    <div class="empty-msg" th:if="${#lists.isEmpty(products)}">
        등록된 상품이 없습니다. 새 상품을 등록해 주세요.
    </div>

    <!--
        th:unless: products 목록이 비어있지 않을 때만 테이블 표시
    -->
    <table th:unless="${#lists.isEmpty(products)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>상품명</th>
                <th>카테고리</th>
                <th>가격</th>
                <th>상세보기</th>
            </tr>
        </thead>
        <tbody>
            <!--
                th:each="product : ${products}":
                Java의 for-each 루프에 해당합니다.
                Controller에서 model.addAttribute("products", products)로
                전달한 List<Product>를 하나씩 순회합니다.

                iterStat: 반복 상태 변수 (선택 사항)
                  iterStat.index  → 0부터 시작하는 인덱스
                  iterStat.count  → 1부터 시작하는 카운트
                  iterStat.first  → 첫 번째 항목인지 여부
                  iterStat.last   → 마지막 항목인지 여부
            -->
            <tr th:each="product, iterStat : ${products}">
                <!-- th:text: 엔티티의 getter를 호출합니다. ${product.id} → product.getId() -->
                <td th:text="${product.id}">1</td>
                <td th:text="${product.name}">상품명</td>
                <td th:text="${product.category}">카테고리</td>

                <!--
                    #numbers.formatDecimal(): Thymeleaf 내장 유틸리티 객체
                    숫자를 형식화합니다: 소수점 0자리, 천단위 구분자 적용
                    결과 예: 15000.00 → "15,000"
                -->
                <td class="price"
                    th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')} + '원'">
                    15,000원
                </td>

                <td>
                    <!--
                        th:href="@{/products/{id}(id=${product.id})}":
                        URL 템플릿 표현식입니다.
                        {id} 자리에 product.id 값을 삽입합니다.
                        결과: /products/1, /products/2 등
                    -->
                    <a class="detail-link"
                       th:href="@{/products/{id}(id=${product.id})}"
                       th:text="'#' + ${product.id} + ' 상세보기'">
                        상세보기
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
    <footer style="text-align: center; margin-top: 20px; color: gray;">
        <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' | 학번: 2131139 | 성명: 임창수'}"></p>
    </footer>
</body>
</html>
